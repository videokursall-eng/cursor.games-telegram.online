server {
    listen 80;
    server_name your-domain.com;

    # Redirect plain HTTP to HTTPS (TLS termination is strongly recommended)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.com;

    # SSL certs (replace with real paths)
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Frontend: static build of Telegram Mini App
    root /var/www/durak/frontend/dist;
    index index.html;

    # Gzip for JS/CSS/JSON
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/x-javascript text/javascript;
    gzip_min_length 256;

    # Mini App static (SPA)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # API (NestJS backend). In app, mount API under /api later if needed.
    location /api/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket / Socket.IO (for realtime, will be implemented later)
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 60m;
        proxy_send_timeout 60m;
    }

    # Health-checks for load balancers / uptime monitors
    location /health {
        proxy_pass http://127.0.0.1:3000/health;
        proxy_http_version 1.1;
    }
}

