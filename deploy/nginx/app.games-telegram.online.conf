server {
    listen 80;
    listen [::]:80;
    server_name app.games-telegram.online;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.games-telegram.online;

    ssl_certificate     /etc/letsencrypt/live/app.games-telegram.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.games-telegram.online/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/app.games-telegram.online/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    real_ip_header CF-Connecting-IP;
    set_real_ip_from 0.0.0.0/0;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json application/xml+rss image/svg+xml;

    brotli on;
    brotli_comp_level 5;
    brotli_types text/plain text/css application/javascript application/json application/xml+rss image/svg+xml;

    access_log /var/log/nginx/app.games-telegram.online.access.log;
    error_log  /var/log/nginx/app.games-telegram.online.error.log warn;

    root /var/www/app.games-telegram.online/current/frontend;
    index index.html;

    location = /healthz {
        add_header Content-Type application/json;
        return 200 '{"status":"ok"}';
    }

    location /api/ {
        proxy_pass http://127.0.0.1:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_read_timeout 60s;
    }

    location /realtime {
        proxy_pass http://127.0.0.1:4000/realtime;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location / {
        try_files $uri /index.html;
        add_header Cache-Control "public, max-age=300";
    }

    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}

