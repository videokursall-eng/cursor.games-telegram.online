version: '3.8'

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: durak
      POSTGRES_PASSWORD: durak
      POSTGRES_DB: durak
    ports:
      - '5432:5432'
    volumes:
      - durak_pg_data:/var/lib/postgresql/data

  postgres_test:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: durak
      POSTGRES_PASSWORD: durak
      POSTGRES_DB: durak_test
    ports:
      - '5433:5432'
    volumes:
      - durak_pg_test_data:/var/lib/postgresql/data

volumes:
  durak_pg_data:
  durak_pg_test_data:

